plugins {
  id 'org.jetbrains.kotlin.jvm'
  id 'com.google.devtools.ksp' version '1.5.10-1.0.0-beta01'
}

repositories {
  mavenCentral()
  google()
}

dependencies {
  implementation "org.jetbrains.kotlin:kotlin-stdlib"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.5.0"
  implementation project(':core')
  ksp project(':codegen')

  implementation "io.vertx:vertx-core:4.1.0.CR1"
  implementation "io.vertx:vertx-lang-kotlin:4.1.0.CR1"
  implementation "io.vertx:vertx-lang-kotlin-coroutines:4.1.0.CR1"
}

sourceSets {
  main {
    java {
      srcDir(file("build/generated/ksp/main/kotlin"))
    }
  }
  test {
    java {
      srcDir(file("build/generated/ksp/test/kotlin"))
    }
  }
}
